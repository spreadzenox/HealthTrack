# Test HealthTrack sur un émulateur Android calqué sur le Samsung Galaxy A56.
#
# Specs Samsung Galaxy A56 :
#   Écran : 6.7" Super AMOLED, 1080 × 2340 px (~385 ppi), 120 Hz
#   Android 15 (API 35) / One UI 7
#   RAM : 8 Go
#
# AVD créé : pixel_6 (base) avec config matérielle écrasée pour coller
# exactement à ces valeurs (résolution, densité, RAM).

name: Test — émulateur Samsung Galaxy A56

on:
  workflow_dispatch:

jobs:
  emulator-test:
    name: HealthTrack sur Samsung A56 (API 35, 1080×2340, 385 dpi)
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── KVM (accélération matérielle pour l'émulateur) ───────────────────────
      - name: Activer KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ─── Node / dépendances ───────────────────────────────────────────────────
      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Installer les dépendances npm
        working-directory: app
        run: npm ci

      # ─── Build web + Capacitor ────────────────────────────────────────────────
      - name: Build de l'app web
        working-directory: app
        run: npm run build

      - name: Synchroniser Capacitor (web → Android)
        working-directory: app
        run: npx cap sync android

      # ─── SDK / Gradle ─────────────────────────────────────────────────────────
      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les composants SDK (platform-35, build-tools, émulateur)
        run: |
          sdkmanager --no_https \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64"

      - name: Créer local.properties
        working-directory: app/android
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Rendre gradlew exécutable
        working-directory: app/android
        run: chmod +x gradlew

      # ─── Build APK ────────────────────────────────────────────────────────────
      - name: Construire l'APK debug
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Afficher les infos APK
        run: |
          APK="app/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "APK : $APK  ($(du -h "$APK" | cut -f1))"

      # ─── AVD Samsung Galaxy A56 ───────────────────────────────────────────────
      - name: Créer l'AVD Samsung Galaxy A56
        run: |
          # Crée l'AVD en utilisant pixel_6 comme profil de base, puis écrase
          # les valeurs matérielles pour correspondre exactement au Galaxy A56.
          echo "no" | avdmanager create avd \
            --name "samsung_a56" \
            --package "system-images;android-35;google_apis;x86_64" \
            --device "pixel_6" \
            --force

          AVD_CONFIG="$HOME/.android/avd/samsung_a56.avd/config.ini"

          # Remplace la clé si elle existe, sinon l'ajoute.
          update_or_add() {
            local key="$1" val="$2"
            if grep -q "^${key}=" "$AVD_CONFIG" 2>/dev/null; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$AVD_CONFIG"
            else
              echo "${key}=${val}" >> "$AVD_CONFIG"
            fi
          }

          # Samsung Galaxy A56 : 1080 × 2340 px, ~385 ppi, 8 Go RAM
          update_or_add "hw.lcd.width"   "1080"
          update_or_add "hw.lcd.height"  "2340"
          update_or_add "hw.lcd.density" "385"
          update_or_add "hw.ramSize"     "8192"
          update_or_add "hw.sdCard"      "no"

          echo "=== Config AVD Samsung A56 ==="
          grep -E "hw\.lcd\.|hw\.ram" "$AVD_CONFIG" || true

      # ─── Démarrage émulateur + installation + test ────────────────────────────
      - name: Démarrer l'émulateur et tester HealthTrack
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          avd-name: samsung_a56
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Émulateur Samsung A56 en ligne ==="
            adb devices

            echo "=== Vérification résolution (doit afficher 1080×2340) ==="
            adb shell wm size

            echo "=== Vérification densité (doit afficher ~385) ==="
            adb shell wm density

            echo "=== Installation de l'APK HealthTrack ==="
            adb install -r app/android/app/build/outputs/apk/debug/app-debug.apk

            echo "=== Lancement de l'activité principale ==="
            adb shell am start -n com.healthtrack.app/.MainActivity

            echo "=== Attente du chargement de l'app (10 s) ==="
            sleep 10

            echo "=== Capture d'écran de l'app sur Samsung A56 ==="
            adb exec-out screencap -p > screenshot_samsung_a56.png
            ls -lh screenshot_samsung_a56.png

      # ─── Artefacts ────────────────────────────────────────────────────────────
      - name: Publier la capture d'écran comme artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-samsung-a56
          path: screenshot_samsung_a56.png
          if-no-files-found: warn

      - name: Publier l'APK comme artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      # ─── Résumé dans GitHub Actions ───────────────────────────────────────────
      - name: Résumé du test
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Test HealthTrack — Samsung Galaxy A56 (équivalent)

          | Paramètre         | Valeur                         |
          |-------------------|--------------------------------|
          | Android API       | 35 (Android 15)                |
          | Résolution        | 1080 × 2340 px                 |
          | Densité           | ~385 ppi (xxhdpi)              |
          | Taille écran      | 6.7"                           |
          | RAM émulateur     | 8 Go                           |
          | Architecture      | x86_64 (accéléré KVM)          |
          | Image système     | google_apis                    |

          Les artefacts `screenshot-samsung-a56` et `apk-debug` sont disponibles
          dans l'onglet **Actions → Artifacts** de ce run.
          EOF
