# Test HealthTrack sur un émulateur Android calqué sur le Samsung Galaxy A56.
#
# Specs Samsung Galaxy A56 :
#   Écran : 6.7" Super AMOLED, 1080 × 2340 px (~385 ppi), 120 Hz
#   Android 15 (API 35) / One UI 7
#   RAM : 8 Go
#
# AVD créé : pixel_6 (base) avec config matérielle écrasée pour coller
# exactement à ces valeurs (résolution, densité, RAM).
#
# Ce workflow est déclenché à chaque push et PR sur main, ainsi que
# manuellement (workflow_dispatch).

name: Test — émulateur Samsung Galaxy A56

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  emulator-test:
    name: HealthTrack sur Samsung A56 (API 35, 1080×2340, 385 dpi)
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── KVM (accélération matérielle pour l'émulateur) ───────────────────────
      - name: Activer KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ─── Node / dépendances ───────────────────────────────────────────────────
      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Installer les dépendances npm
        working-directory: app
        run: npm ci

      # ─── Build web + Capacitor ────────────────────────────────────────────────
      - name: Build de l'app web
        working-directory: app
        run: npm run build

      - name: Synchroniser Capacitor (web → Android)
        working-directory: app
        run: npx cap sync android

      # ─── SDK / Gradle ─────────────────────────────────────────────────────────
      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les composants SDK (platform-35, build-tools, émulateur)
        run: |
          sdkmanager --no_https \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64"

      - name: Créer local.properties
        working-directory: app/android
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Rendre gradlew exécutable
        working-directory: app/android
        run: chmod +x gradlew

      # ─── Build APK + APK de test ──────────────────────────────────────────────
      - name: Construire l'APK debug et l'APK de test
        working-directory: app/android
        run: ./gradlew assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Afficher les infos APK
        run: |
          APK="app/android/app/build/outputs/apk/debug/app-debug.apk"
          TEST_APK="app/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
          echo "APK principal    : $APK  ($(du -h "$APK" | cut -f1))"
          echo "APK de test       : $TEST_APK  ($(du -h "$TEST_APK" | cut -f1))"

      # ─── AVD Samsung Galaxy A56 ───────────────────────────────────────────────
      - name: Créer l'AVD Samsung Galaxy A56
        run: |
          echo "no" | avdmanager create avd \
            --name "samsung_a56" \
            --package "system-images;android-35;google_apis;x86_64" \
            --device "pixel_6" \
            --force

          # Locate the config.ini dynamically — avdmanager may place AVDs under
          # $ANDROID_AVD_HOME, $ANDROID_SDK_HOME/.android/avd, or $HOME/.android/avd
          # depending on the runner environment.
          AVD_DIR=$(avdmanager list avd 2>/dev/null \
            | grep -A3 "Name: samsung_a56" \
            | grep "Path:" \
            | awk '{print $2}')

          if [ -z "$AVD_DIR" ]; then
            echo "ERROR: could not find AVD path via avdmanager list avd"
            avdmanager list avd
            exit 1
          fi

          AVD_CONFIG="${AVD_DIR}/config.ini"
          echo "AVD path   : $AVD_DIR"
          echo "Config file: $AVD_CONFIG"

          update_or_add() {
            local key="$1" val="$2"
            if grep -q "^${key}=" "$AVD_CONFIG" 2>/dev/null; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$AVD_CONFIG"
            else
              echo "${key}=${val}" >> "$AVD_CONFIG"
            fi
          }

          # Samsung Galaxy A56 : 1080 × 2340 px, ~385 ppi, 8 Go RAM
          update_or_add "hw.lcd.width"   "1080"
          update_or_add "hw.lcd.height"  "2340"
          update_or_add "hw.lcd.density" "385"
          update_or_add "hw.ramSize"     "8192"
          update_or_add "hw.sdCard"      "no"

          echo "=== Config AVD Samsung A56 ==="
          grep -E "hw\.lcd\.|hw\.ram" "$AVD_CONFIG" || true

      # ─── Démarrage émulateur, tests instrumentés, screenshot ─────────────────
      - name: Lancer l'émulateur, accorder les permissions HC et exécuter les tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          avd-name: samsung_a56
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Émulateur Samsung A56 en ligne ==="
            adb devices

            echo "=== Résolution de l'écran ==="
            adb shell wm size
            echo "=== Densité de l'écran ==="
            adb shell wm density

            echo "=== Installation de l'APK HealthTrack ==="
            adb install -r app/android/app/build/outputs/apk/debug/app-debug.apk

            echo "=== Installation de l'APK de test ==="
            adb install -r app/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

            echo "=== Vérification de la disponibilité de Health Connect ==="
            # Sur API 35 (google_apis), Health Connect est présent mais peut nécessiter
            # que le package com.google.android.healthconnect.controller soit lancé une
            # première fois. On le démarre en arrière-plan.
            adb shell am start -n com.google.android.healthconnect.controller/.ui.MainNavigationActivity 2>/dev/null || true
            sleep 3
            adb shell am force-stop com.google.android.healthconnect.controller 2>/dev/null || true

            echo "=== Accord des permissions Health Connect via ADB ==="
            # Ces permissions fonctionnent sur l'image google_apis (émulateur) sans popup utilisateur.
            # Note: use a plain for-loop (POSIX sh compatible — no bash arrays).
            for PERM in \
              android.permission.health.READ_STEPS \
              android.permission.health.WRITE_STEPS \
              android.permission.health.READ_HEART_RATE \
              android.permission.health.WRITE_HEART_RATE \
              android.permission.health.READ_SLEEP \
              android.permission.health.WRITE_SLEEP \
              android.permission.health.READ_DISTANCE \
              android.permission.health.WRITE_DISTANCE \
              android.permission.health.READ_ACTIVE_CALORIES_BURNED \
              android.permission.health.WRITE_ACTIVE_CALORIES_BURNED \
              android.permission.health.READ_RESTING_HEART_RATE \
              android.permission.health.WRITE_RESTING_HEART_RATE \
              android.permission.health.READ_HEART_RATE_VARIABILITY \
              android.permission.health.WRITE_HEART_RATE_VARIABILITY \
              android.permission.health.READ_OXYGEN_SATURATION \
              android.permission.health.WRITE_OXYGEN_SATURATION \
              android.permission.health.READ_EXERCISE \
              android.permission.health.WRITE_EXERCISE \
              android.permission.health.READ_TOTAL_CALORIES_BURNED \
              android.permission.health.WRITE_TOTAL_CALORIES_BURNED; do
              adb shell pm grant com.healthtrack.app "$PERM" 2>/dev/null && echo "OK $PERM" || echo "SKIP $PERM"
            done

            echo "=== Lancement de HealthTrack ==="
            adb shell am start -n com.healthtrack.app/.MainActivity
            sleep 5

            echo "=== Capture d'écran de HealthTrack au démarrage ==="
            adb exec-out screencap -p > screenshot_startup.png
            ls -lh screenshot_startup.png

            echo "=== Exécution des tests instrumentés Health Connect ==="
            adb shell am instrument -w \
              -e class com.healthtrack.app.HealthConnectTest \
              com.healthtrack.app.test/androidx.test.runner.AndroidJUnitRunner \
              2>&1 | tee instrumented_test_output.txt

            echo "=== Résultat des tests ==="
            cat instrumented_test_output.txt

            # Naviguer vers la page Connecteurs et capturer une screenshot
            echo "=== Navigation vers la page Connecteurs ==="
            # L'app est une WebView — on peut simuler un tap sur le lien de nav
            # en utilisant les coordonnées approximatives pour la résolution 1080×2340
            # Barre de navigation : les liens sont en bas du header
            # On navigue via un intent de vue interne
            adb shell input tap 810 260 2>/dev/null || true
            sleep 3
            adb exec-out screencap -p > screenshot_connectors_page.png
            ls -lh screenshot_connectors_page.png

            echo "=== Vérification du succès des tests ==="
            if grep -q "FAILURES!!!" instrumented_test_output.txt; then
              echo "ERREUR : Des tests instrumentés ont échoué !"
              exit 1
            elif grep -q "OK (.*test" instrumented_test_output.txt; then
              echo "SUCCÈS : Tous les tests instrumentés ont réussi."
            elif grep -q "assumptionFailure" instrumented_test_output.txt; then
              echo "INFO : Des tests ont été ignorés (assumeTrue) — Health Connect non disponible sur cette image."
            else
              echo "INFO : Résultat des tests non déterminé — vérifiez instrumented_test_output.txt."
            fi

      # ─── Artefacts ────────────────────────────────────────────────────────────
      - name: Publier les captures d'écran
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-samsung-a56
          path: |
            screenshot_startup.png
            screenshot_connectors_page.png
          if-no-files-found: warn

      - name: Publier le rapport de tests instrumentés
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: |
            instrumented_test_output.txt
            app/android/app/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Publier l'APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      # ─── Résumé dans GitHub Actions ───────────────────────────────────────────
      - name: Résumé du test
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Test HealthTrack — Samsung Galaxy A56 (équivalent)

          | Paramètre         | Valeur                         |
          |-------------------|--------------------------------|
          | Android API       | 35 (Android 15)                |
          | Résolution        | 1080 × 2340 px                 |
          | Densité           | ~385 ppi (xxhdpi)              |
          | Taille écran      | 6.7"                           |
          | RAM émulateur     | 8 Go                           |
          | Architecture      | x86_64 (accéléré KVM)          |
          | Image système     | google_apis                    |

          ### Tests instrumentés Health Connect
          Les permissions Health Connect sont accordées via ADB avant les tests.
          Les tests vérifient : disponibilité, écriture/lecture des pas, fréquence cardiaque et sommeil.

          Les artefacts sont disponibles dans l'onglet **Actions → Artifacts** :
          - `screenshots-samsung-a56` — captures d'écran au démarrage et sur la page Connecteurs
          - `instrumented-test-results` — sortie brute des tests instrumentés
          - `apk-debug` — APK installé lors du test
          EOF
