# Build de l'app HealthTrack et création d'une GitHub Release avec l'APK.
# Déclenché à chaque push sur main. La version = run_number (tag v123, etc.).
name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build app & APK → Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app (with version)
        working-directory: app
        env:
          VITE_APP_VERSION: ${{ github.run_number }}
        run: npm run build

      - name: Sync Capacitor
        working-directory: app
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties
        working-directory: app/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Make gradlew executable
        working-directory: app/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Create Release and upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.run_number }}"
          TAG="v${VERSION}"
          APK_PATH="app/android/app/build/outputs/apk/debug/app-debug.apk"
          APK_NAME="HealthTrack-${TAG}.apk"
          cp "$APK_PATH" "$APK_NAME"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "$APK_NAME" \
            --title "HealthTrack ${TAG}" \
            --notes "Build automatique après push sur main. Version ${VERSION}." \
            --latest