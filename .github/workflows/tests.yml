name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"

      - name: Install frontend dependencies
        run: |
          cd app
          npm ci

      - name: Run frontend tests
        run: |
          cd app
          npm run test
